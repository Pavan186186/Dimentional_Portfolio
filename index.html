<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pavan Teja Tallapalli | Dimensional Portfolio</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; color: #88c0d0; font-family: monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }
        h1 { font-size: 2rem; margin: 0; text-shadow: 0 0 10px rgba(136, 192, 208, 0.5); }
        p { font-size: 1rem; opacity: 0.8; }
        .instruction { position: absolute; bottom: 10%; width: 100%; text-align: center; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1 id="title">Pavan Teja Tallapalli</h1>
        <p id="subtitle">Data Scientist & Software Engineer</p>
    </div>
    <div class="instruction" id="instruction">Click and drag right to expand to 1D</div>
    <div id="canvas-container"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
